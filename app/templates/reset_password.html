{% extends "base.html" %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
        font-family: 'Inter', sans-serif;
    }

    .reset-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        position: relative;
        overflow: hidden;
    }

    @keyframes gradientShift {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    .reset-wrapper::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
            radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
        animation: particleFloat 20s ease-in-out infinite;
    }

    @keyframes particleFloat {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-20px);
        }
    }

    .reset-card {
        width: 100%;
        max-width: 460px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 3.5rem 3rem;
        box-shadow:
            0 25px 50px -12px rgba(0, 0, 0, 0.25),
            0 0 0 1px rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 10;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .reset-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        font-size: 2rem;
        color: white;
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.05);
        }
    }

    .reset-title {
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .reset-subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 2.5rem;
        font-size: 0.9375rem;
        font-weight: 500;
        line-height: 1.6;
    }

    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: #334155;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.3px;
    }

    .form-control-wrapper {
        position: relative;
    }

    .form-control {
        width: 100%;
        padding: 0.875rem 1rem;
        padding-left: 3rem;
        padding-right: 3rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 0.9375rem;
        transition: all 0.3s ease;
        background: white;
    }

    .form-control:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1.125rem;
        transition: color 0.3s ease;
    }

    .form-control:focus+.input-icon {
        color: #10b981;
    }

    .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        padding: 0.25rem;
        transition: color 0.3s ease;
    }

    .password-toggle:hover {
        color: #10b981;
    }

    .password-strength {
        margin-top: 0.5rem;
        height: 4px;
        background: #e2e8f0;
        border-radius: 2px;
        overflow: hidden;
        display: none;
    }

    .password-strength-bar {
        height: 100%;
        width: 0%;
        transition: all 0.3s ease;
        border-radius: 2px;
    }

    .password-strength.weak .password-strength-bar {
        width: 33%;
        background: #ef4444;
    }

    .password-strength.medium .password-strength-bar {
        width: 66%;
        background: #f59e0b;
    }

    .password-strength.strong .password-strength-bar {
        width: 100%;
        background: #10b981;
    }

    .password-requirements {
        margin-top: 1rem;
        padding: 1rem;
        background: #f8fafc;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
    }

    .password-requirements-title {
        font-size: 0.8125rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 0.5rem;
    }

    .requirement {
        font-size: 0.8125rem;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }

    .requirement i {
        font-size: 0.75rem;
        color: #94a3b8;
    }

    .requirement.met i {
        color: #10b981;
    }

    .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        position: relative;
        overflow: hidden;
        margin-top: 1.5rem;
    }

    .submit-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    .submit-btn:hover::before {
        left: 100%;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .back-to-login {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #e2e8f0;
    }

    .back-link {
        color: #667eea;
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
    }

    .back-link:hover {
        color: #764ba2;
        gap: 0.75rem;
    }

    .back-link i {
        transition: transform 0.3s ease;
    }

    .back-link:hover i {
        transform: translateX(-4px);
    }

    .alert {
        border-radius: 12px;
        border: none;
        padding: 1rem 1.25rem;
        margin-bottom: 1.5rem;
        animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-danger {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.1) 100%);
        color: #dc2626;
        border-left: 4px solid #dc2626;
    }

    .alert-warning {
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(217, 119, 6, 0.1) 100%);
        color: #d97706;
        border-left: 4px solid #d97706;
    }

    @media (max-width: 576px) {
        .reset-card {
            margin: 1rem;
            padding: 2.5rem 2rem;
        }

        .reset-title {
            font-size: 1.75rem;
        }

        .reset-icon {
            width: 70px;
            height: 70px;
            font-size: 1.75rem;
        }
    }

    .submit-btn.loading {
        pointer-events: none;
        opacity: 0.7;
    }

    .submit-btn.loading::after {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        top: 50%;
        left: 50%;
        margin-left: -8px;
        margin-top: -8px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">
        <div class="reset-icon">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h1 class="reset-title">Reset Password</h1>
        <p class="reset-subtitle">Create a new secure password for your account.</p>

        <form method="POST" id="resetForm">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="form-control-wrapper">
                    <input type="password" name="password" id="password" class="form-control"
                        placeholder="Enter new password" required autofocus>
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')">
                        <i class="bi bi-eye" id="toggleIcon1"></i>
                    </button>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="form-control-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                        placeholder="Confirm new password" required>
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="password-toggle"
                        onclick="togglePassword('confirm_password', 'toggleIcon2')">
                        <i class="bi bi-eye" id="toggleIcon2"></i>
                    </button>
                </div>
            </div>

            <div class="password-requirements">
                <div class="password-requirements-title">Password Requirements:</div>
                <div class="requirement" id="req-length">
                    <i class="bi bi-circle"></i>
                    <span>At least 6 characters</span>
                </div>
                <div class="requirement" id="req-match">
                    <i class="bi bi-circle"></i>
                    <span>Passwords match</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="back-to-login">
            <a href="{{ url_for('main.login') }}" class="back-link">
                <i class="bi bi-arrow-left"></i>
                <span>Back to Login</span>
            </a>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    }

    // Password strength indicator
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const strengthIndicator = document.getElementById('passwordStrength');
    const reqLength = document.getElementById('req-length');
    const reqMatch = document.getElementById('req-match');
    const submitBtn = document.getElementById('submitBtn');

    passwordInput.addEventListener('input', function () {
        const password = this.value;
        strengthIndicator.style.display = 'block';

        // Check length
        if (password.length >= 6) {
            reqLength.classList.add('met');
            reqLength.querySelector('i').classList.remove('bi-circle');
            reqLength.querySelector('i').classList.add('bi-check-circle-fill');
        } else {
            reqLength.classList.remove('met');
            reqLength.querySelector('i').classList.remove('bi-check-circle-fill');
            reqLength.querySelector('i').classList.add('bi-circle');
        }

        // Password strength
        strengthIndicator.className = 'password-strength';
        if (password.length < 6) {
            strengthIndicator.classList.add('weak');
        } else if (password.length < 10) {
            strengthIndicator.classList.add('medium');
        } else {
            strengthIndicator.classList.add('strong');
        }

        checkMatch();
    });

    confirmInput.addEventListener('input', checkMatch);

    function checkMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (confirm.length > 0) {
            if (password === confirm) {
                reqMatch.classList.add('met');
                reqMatch.querySelector('i').classList.remove('bi-circle');
                reqMatch.querySelector('i').classList.add('bi-check-circle-fill');
                submitBtn.disabled = false;
            } else {
                reqMatch.classList.remove('met');
                reqMatch.querySelector('i').classList.remove('bi-check-circle-fill');
                reqMatch.querySelector('i').classList.add('bi-circle');
                submitBtn.disabled = true;
            }
        }
    }

    document.getElementById('resetForm').addEventListener('submit', function () {
        const btn = document.getElementById('submitBtn');
        btn.classList.add('loading');
        btn.textContent = '';
    });

    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('password').focus();
    });
</script>
{% endblock %}
