{% extends "base.html" %}

{% block title %}Mobile Connect{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-4">
        <!-- Premium Mobile Connect Card -->
        <div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 20px;">
            <div class="card-header bg-white border-0 text-center pt-5 pb-0">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle" style="width: 80px; height: 80px;">
                        <i class="bi bi-phone-vibrate fs-1"></i>
                    </div>
                </div>
                <h2 class="fw-bold mb-1">Mobile Access</h2>
                <p class="text-muted">Scan to connect instantly</p>
            </div>
            
            <div class="card-body text-center p-4">
                <!-- QR Code Container -->
                <div class="d-flex justify-content-center mb-4">
                    <div class="p-3 bg-white rounded-4 shadow-sm border border-light" style="width: fit-content;">
                        <div id="qrcode"></div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <p class="mb-2 text-muted fw-medium small text-uppercase">Or visit this URL</p>
                    <div class="d-flex align-items-center justify-content-center gap-2 p-3 rounded-3 bg-light">
                        <code class="fs-6 fw-bold text-dark" id="accessUrl">{{ mobile_url }}</code>
                        <button class="btn btn-icon btn-sm btn-light text-primary" onclick="copyUrl()" title="Copy Link">
                            <i class="bi bi-copy"></i>
                        </button>
                    </div>
                </div>

                <div class="alert alert-info border-0 bg-primary bg-opacity-10 text-primary d-flex align-items-center gap-2 mb-0" role="alert">
                    <i class="bi bi-wifi-fill"></i>
                    <div class="small fw-medium text-start lh-sm">
                        Ensure your mobile device is on the same Wi-Fi network as this computer.
                    </div>
                </div>
            </div>
            
            <div class="card-footer bg-white border-0 text-center pb-5 pt-0">
                <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="bi bi-arrow-left me-2"></i>Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<!-- QR Code Generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const url = "{{ mobile_url }}";
        const qrContainer = document.getElementById("qrcode");
        
        // Clear previous if any
        qrContainer.innerHTML = '';
        
        // Generate QR
        new QRCode(qrContainer, {
            text: url,
            width: 200,
            height: 200,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    });

    function copyUrl() {
        const urlText = document.getElementById('accessUrl').innerText;
        navigator.clipboard.writeText(urlText).then(() => {
            // Visual feedback
            const btn = document.querySelector('button[onclick="copyUrl()"]');
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-check-lg"></i>';
            setTimeout(() => {
                btn.innerHTML = originalIcon;
            }, 2000);
        });
    }
</script>
{% endblock %}
