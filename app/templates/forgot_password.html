{% extends "base.html" %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
        font-family: 'Inter', sans-serif;
    }

    .forgot-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        position: relative;
        overflow: hidden;
    }

    @keyframes gradientShift {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    .forgot-wrapper::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
            radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
        animation: particleFloat 20s ease-in-out infinite;
    }

    @keyframes particleFloat {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-20px);
        }
    }

    .forgot-card {
        width: 100%;
        max-width: 460px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 3.5rem 3rem;
        box-shadow:
            0 25px 50px -12px rgba(0, 0, 0, 0.25),
            0 0 0 1px rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 10;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .forgot-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        font-size: 2rem;
        color: white;
        box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.05);
        }
    }

    .forgot-title {
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .forgot-subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 2.5rem;
        font-size: 0.9375rem;
        font-weight: 500;
        line-height: 1.6;
    }

    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: #334155;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.3px;
    }

    .form-control-wrapper {
        position: relative;
    }

    .form-control {
        width: 100%;
        padding: 0.875rem 1rem;
        padding-left: 3rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 0.9375rem;
        transition: all 0.3s ease;
        background: white;
    }

    .form-control:focus {
        outline: none;
        border-color: #f59e0b;
        box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1.125rem;
        transition: color 0.3s ease;
    }

    .form-control:focus+.input-icon {
        color: #f59e0b;
    }

    .reset-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        position: relative;
        overflow: hidden;
    }

    .reset-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    .reset-btn:hover::before {
        left: 100%;
    }

    .reset-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(245, 158, 11, 0.4);
    }

    .reset-btn:active {
        transform: translateY(0);
    }

    .back-to-login {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #e2e8f0;
    }

    .back-link {
        color: #667eea;
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
    }

    .back-link:hover {
        color: #764ba2;
        gap: 0.75rem;
    }

    .back-link i {
        transition: transform 0.3s ease;
    }

    .back-link:hover i {
        transform: translateX(-4px);
    }

    .info-box {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.1) 100%);
        border-left: 4px solid #3b82f6;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
    }

    .info-box i {
        color: #3b82f6;
        font-size: 1.25rem;
        margin-top: 0.125rem;
    }

    .info-box-text {
        color: #1e40af;
        font-size: 0.875rem;
        line-height: 1.6;
    }

    .alert {
        border-radius: 12px;
        border: none;
        padding: 1rem 1.25rem;
        margin-bottom: 1.5rem;
        animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert-success {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
        color: #059669;
        border-left: 4px solid #059669;
    }

    .alert-danger {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.1) 100%);
        color: #dc2626;
        border-left: 4px solid #dc2626;
    }

    @media (max-width: 576px) {
        .forgot-card {
            margin: 1rem;
            padding: 2.5rem 2rem;
        }

        .forgot-title {
            font-size: 1.75rem;
        }

        .forgot-icon {
            width: 70px;
            height: 70px;
            font-size: 1.75rem;
        }
    }

    .reset-btn.loading {
        pointer-events: none;
        opacity: 0.7;
    }

    .reset-btn.loading::after {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        top: 50%;
        left: 50%;
        margin-left: -8px;
        margin-top: -8px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="forgot-wrapper">
    <div class="forgot-card">
        <div class="forgot-icon">
            <i class="bi bi-key"></i>
        </div>

        <h1 class="forgot-title">Forgot Password?</h1>
        <p class="forgot-subtitle">Enter your username or email and we'll send you a link to reset your password.</p>

        <div class="info-box">
            <i class="bi bi-info-circle"></i>
            <div class="info-box-text">
                A password reset link will be sent to your registered email address. The link will expire in 1 hour for
                security.
            </div>
        </div>

        <form method="POST" id="forgotForm">
            <div class="form-group">
                <label class="form-label">Username or Email</label>
                <div class="form-control-wrapper">
                    <input type="text" name="username" id="username" class="form-control"
                        placeholder="Enter your username or email" required autofocus>
                    <i class="bi bi-person input-icon"></i>
                </div>
            </div>

            <button type="submit" class="reset-btn" id="resetBtn">
                Send Reset Link
            </button>
        </form>

        <div class="back-to-login">
            <a href="{{ url_for('main.login') }}" class="back-link">
                <i class="bi bi-arrow-left"></i>
                <span>Back to Login</span>
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', function () {
        const btn = document.getElementById('resetBtn');
        btn.classList.add('loading');
        btn.textContent = '';
    });

    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('username').focus();
    });
</script>
{% endblock %}
